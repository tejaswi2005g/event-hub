kind = "web"
previewPath = "/"
title = "Event Management System"
version = "1.0.0"
id = "artifacts/event-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22374

[services.development]
run = "pnpm --filter @workspace/event-management run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-management", "run", "build" ]
publicDir = "artifacts/event-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22374"
BASE_PATH = "/"
